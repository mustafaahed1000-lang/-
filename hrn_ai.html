<body>

<div id="edit-modal" class="edit-modal-overlay">
  <div class="edit-modal-box">
    <div class="edit-modal-header">
      <span>Edit Message</span>
      <button class="edit-modal-close" onclick="App.closeEditModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="edit-modal-body">
      <textarea id="edit-modal-textarea" class="edit-modal-textarea" placeholder="Edit your message..."></textarea>
    </div>
    <div class="edit-modal-footer">
      <button class="btn-cancel" onclick="App.closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="App.saveEditModal()">Save & Submit</button>
    </div>
  </div>
</div>

<div id="lightbox-modal" class="lightbox-modal">
  <div class="lightbox-close" onclick="App.closeLightbox()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </div>
  <div class="lightbox-main-area" onclick="event.stopPropagation()">
    <img id="lightbox-img" class="lightbox-img" src="" alt="Preview">
  </div>
  <div class="lightbox-thumbs-wrapper" onclick="event.stopPropagation()">
    <div id="lightbox-thumbs" class="lightbox-thumbs"></div>
  </div>
</div>

<div class="sidebar-overlay" onclick="App.toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="new-btn" onclick="App.newChat()" style="width:100%">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Chat
    </button>
  </div>
  <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
  <div id="quota-toast" class="toast-notification">
    <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <div class="toast-content">
      <div class="toast-title">Limit reached</div>

 ${caps.internet

### BEHAVIOR

DEFINITIONS

TARGET_LANGUAGE: The language used in the user’s most recent message with clear grammar

LOANWORDS: Words that appear across languages and do not define language

RULE 1 — LANGUAGE RESOLUTION (PRIMARY LOGIC)

RULE 6 — MONOLINGUAL ENFORCEMENT

RULE 8 — VALIDATION LOOP

  const escapeHtml = (unsafe) => {
    if (!unsafe) return '';
    return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

  function generateCodeBlockHtml(code, lang) {
    let highlightedCode = "";
    try {
      if (lang && hljs.getLanguage(lang)) {
        highlightedCode = hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
      } else {
        highlightedCode = hljs.highlightAuto(code).value;
      }
    } catch (e) {
      highlightedCode = escapeHtml(code);
    }
    return `<div class="code-wrapper"><div class="code-header"><span class="code-lang">${escapeHtml(lang || 'plaintext')}</span><button class="copy-code-btn" onclick="App.copyCodeBlock(this)">Copy</button></div><pre><code class="hljs language-${escapeHtml(lang || '')}">${highlightedCode}</code></pre></div>`;
  }

  function parseMarkdown(text) {
    if (!text) return "";

    const customCodeBlocks = [];
    let t = text.replace(/\[\/hrn-cb\]([a-zA-Z0-9+_-]*)\n?([\s\S]*?)\[\/\/hrn-cb\]/g, (match, lang, code) => {
      const id = customCodeBlocks.length;
      customCodeBlocks.push(generateCodeBlockHtml(code, lang));
      return `[[CUSTOMCODEBLOCK${id}]]`;
    });

    t = t.replace(/\[\/hrn-cb\]([a-zA-Z0-9+_-]*)\n?([\s\S]*)$/g, (match, lang, code) => {
      const id = customCodeBlocks.length;
      customCodeBlocks.push(generateCodeBlockHtml(code, lang));
      return `[[CUSTOMCODEBLOCK${id}]]`;
    });

    t = t.replace(/```/g, '&#96;&#96;&#96;');

    const mathBlocks = [];
    t = t.replace(/\$\$([\s\S]*?)\$\$/g, (match, p1) => {
      const id = mathBlocks.length;
      mathBlocks.push('\\[' + p1 + '\\]');
      return '[[MATHBLOCK' + id + ']]';
    });
    t = t.replace(/\$([^\$\n]+?)\$/g, (match, p1) => {
      const id = mathBlocks.length;
      mathBlocks.push('\\(' + p1 + '\\)');
      return '[[MATHBLOCK' + id + ']]';
    });

    let html = marked.parse(t);

    mathBlocks.forEach((val, i) => { html = html.split('[[MATHBLOCK' + i + ']]').join(val); });
    customCodeBlocks.forEach((val, i) => { html = html.split('[[CUSTOMCODEBLOCK' + i + ']]').join(val); });

    return html.trim();
  }

  function diffAndPatch(container, newHtml) {
    const temp = document.createElement('div');
    temp.innerHTML = newHtml;

    const newChildren = Array.from(temp.childNodes);
    const oldChildren = Array.from(container.childNodes);

    const mathjaxElements = [];
    const len = Math.max(oldChildren.length, newChildren.length);

    for (let i = 0; i < len; i++) {
      const oldNode = oldChildren[i];
      const newNode = newChildren[i];

      if (!oldNode) {
        container.appendChild(newNode);
        if (newNode.nodeType === 1) mathjaxElements.push(newNode);
      } else if (!newNode) {
        container.removeChild(oldNode);
      } else {
        const oldText = oldNode.textContent;
        const newText = newNode.textContent;

        if (oldNode.nodeName !== newNode.nodeName || oldText !== newText) {
          container.replaceChild(newNode, oldNode);
          if (newNode.nodeType === 1) mathjaxElements.push(newNode);
        }
      }
    }
    return mathjaxElements;
  }

  function _initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onerror = (e) => reject("IndexedDB error: " + e.target.error);
      request.onsuccess = (e) => { db = e.target.result; resolve(db); };
      request.onupgradeneeded = (e) => {
        const database = e.target.result;
        if (!database.objectStoreNames.contains(DB_STORE)) {
          database.createObjectStore(DB_STORE, { keyPath: "id" });
        }
      };
    });
  }

  function _dbOperation(mode, operation) {
    return new Promise((resolve, reject) => {
      if (!db) return reject("DB not init");
      const transaction = db.transaction(DB_STORE, mode);
      const store = transaction.objectStore(DB_STORE);
      const request = operation(store);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  function _saveChatsToDB() {
    const data = { id: "main_history", chats: CHATS };
    return _dbOperation("readwrite", store => store.put(data));
  }

  function _loadChatsFromDB() {
    return _dbOperation("readonly", store => store.get("main_history")).then(data => data ? data.chats : []).catch(() => []);
  }

  function _cleanTitle(text) {

  }

  function _hideQuotaToast() {

  function _updateCountdown() {
    const now = new Date();
    const nextHour = new Date(now);
    nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
    const diff = nextHour - now;
    if (diff <= 0) { _hideQuotaToast(); updateBalance(); return; }
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    $('toast-countdown').innerText = minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
  }

  async function updateBalance() {

      if (response.status === 402) { _showQuotaToast(); balanceEl.innerText = "LIMIT"; return; }

      if (!response.ok) throw new Error("HTTP status " + response.status);
      const data = await response.json();
      balanceEl.innerText = Math.round(((data.balance || 0) + Number.EPSILON) * 1000).toLocaleString() + " CREDITS";

      titleSpan.title = displayTitle;

      const editBtn = document.createElement("button");
      editBtn.className = "edit-title-btn";
      editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      editBtn.title = "Edit title";
      editBtn.onclick = (e) => { e.stopPropagation(); _startEditTitle(chat.id, titleSpan); };

      titleWrap.appendChild(titleSpan);
      titleWrap.appendChild(editBtn);
      titleSpan.ondblclick = (e) => { e.stopPropagation(); _startEditTitle(chat.id, titleSpan); };

      item.onclick = () => loadChat(chat.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "act-btn";
      deleteBtn.onclick = e => { e.stopPropagation(); deleteChat(chat.id); };
      deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;opacity:0.6"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

      item.appendChild(titleWrap);
      item.appendChild(deleteBtn);
      chatListEl.appendChild(item);
    });
  }

  function _startEditTitle(chatId, titleElement) {
    const chat = CHATS.find(c => c.id === chatId);
    if (!chat) return;
    const currentTitle = chat.title || "New Chat";
    const input = document.createElement("input");
    input.type = "text";
    input.className = "chat-title-input";
    input.value = currentTitle;
    const parent = titleElement.parentNode;
    parent.replaceChild(input, titleElement);
    input.focus();
    input.select();
    const saveTitle = async () => {
      const newTitle = input.value.trim() || "New Chat";
      chat.title = newTitle;
      await _saveChatsToDB();
      const newSpan = document.createElement("span");
      newSpan.className = "chat-title";
      newSpan.innerText = _cleanTitle(newTitle);
      newSpan.title = _cleanTitle(newTitle);
      newSpan.ondblclick = (e) => { e.stopPropagation(); _startEditTitle(chatId, newSpan); };
      parent.replaceChild(newSpan, input);
    };
    input.onblur = saveTitle;
    input.onkeydown = (e) => {
      if (e.key === "Enter") { e.preventDefault(); input.blur(); }
      else if (e.key === "Escape") { input.value = currentTitle; input.blur(); }
    };
  }

  async function _generateChatTitle(chatId, userMessage, aiResponse) {
    try {
      const response = await fetch(`${API_BASE}/v1/chat/completions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + PK },
        body: JSON.stringify({
          model: "gemini-fast", // Use fast model for title gen
          messages: [
            { role: "system", content: "Generate a very short title (max 4 words) for this conversation. Respond with ONLY the title, no quotes, no punctuation. Use the same language as the user's message." },
            { role: "user", content: "User: " + userMessage + "\n\nAssistant: " + aiResponse.substring(0, 200) }
          ],
          max_tokens: 20,
          temperature: 0.7
        })
      });
      if (!response.ok) return null;
      const data = await response.json();
      const title = data.choices?.[0]?.message?.content?.trim();
      if (title && title.length > 0 && title.length <= 50) {
        const chat = CHATS.find(c => c.id === chatId);
        if (chat) { chat.title = title; await _saveChatsToDB(); renderSidebar(); return title; }
      }
    } catch (e) { console.error("Title generation error:", e); }
    return null;
  }

  function loadChat(id) {
    if (isGenerating) return;
    CURRENT_ID = id;
    const chat = CHATS.find(c => c.id === id);
    if (chat) {
      welcomeEl.style.display = "none";
      chatViewEl.style.display = "block";
      chatContainerEl.innerHTML = "";
      if (chat.messages && Array.isArray(chat.messages)) {
        chat.messages.forEach((msg, index) => { renderMsg(msg.role, msg.content, index, true, msg.images); });
      }
      renderSidebar();
      if (window.innerWidth < 1024) document.body.classList.remove("sidebar-open");
      requestAnimationFrame(() => { chatViewEl.scrollTop = chatViewEl.scrollHeight; userScrolledUp = false; });
    }
  }

  function newChat() {
    if (isGenerating) return;
    CURRENT_ID = null;
    welcomeEl.style.display = "flex";
    chatViewEl.style.display = "none";
    chatContainerEl.innerHTML = "";
    renderSidebar();
  }

  async function deleteChat(id) {
    CHATS = CHATS.filter(c => c.id !== id);
    await _saveChatsToDB();
    if (CURRENT_ID === id) newChat();
    else renderSidebar();
  }

  function copyText(button, text) {
    const textToCopy = text !== undefined ? text : (button.dataset.code || "");
    if (!textToCopy) return;
    navigator.clipboard.writeText(decodeURIComponent(textToCopy)).then(() => {
      const originalHTML = button.innerHTML;
      button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
      setTimeout(() => button.innerHTML = originalHTML, 2000);
    });
  }

  function copyCodeBlock(button) {
    const wrapper = button.closest('.code-wrapper');
    const codeEl = wrapper.querySelector('code');
    const text = codeEl.innerText;
    navigator.clipboard.writeText(text).then(() => {
      const originalText = button.innerText;
      button.innerText = 'Copied!';
      button.style.borderColor = 'var(--accent)';
      button.style.color = 'var(--accent)';
      setTimeout(() => {
        button.innerText = originalText;
        button.style.borderColor = '';
        button.style.color = '';
      }, 2000);
    });
  }

  function startSuggestion(text) { promptEl.value = text; handleSendOrStop(); }

  function openEditModal(index) {
    const chat = CHATS.find(c => c.id === CURRENT_ID);
    if (!chat || !chat.messages) return;
    if (index === undefined) {
      for (let i = chat.messages.length - 1; i >= 0; i--) {
        if (chat.messages[i].role === 'user') { index = i; break; }
      }
    }
    if (index === -1 || index === undefined) return;
    const msg = chat.messages[index];
    editingIndex = index;
    editModalTextarea.value = msg.content || "";
    editModal.classList.add('show');
    setTimeout(() => {
      editModalTextarea.focus();
      editModalTextarea.style.height = 'auto';
      editModalTextarea.style.height = editModalTextarea.scrollHeight + 'px';
    }, 100);
  }

  function closeEditModal() {
    editModal.classList.remove('show');
    editingIndex = -1;
  }

  async function saveEditModal() {
    if (editingIndex === -1) return;
    const newText = editModalTextarea.value.trim();
    if (!newText) return;
    const chat = CHATS.find(c => c.id === CURRENT_ID);
    if (!chat) return;
    chat.messages[editingIndex].content = newText;
    chat.messages = chat.messages.slice(0, editingIndex + 1);
    await _saveChatsToDB();
    closeEditModal();
    loadChat(CURRENT_ID);
    streamAI(false);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey) && editModal.classList.contains('show')) {
      e.preventDefault();
      saveEditModal();
    }
    if (e.key === 'Escape' && editModal.classList.contains('show')) {
      closeEditModal();
    }
  });

  async function handleRegen(index) {
    if (isGenerating) return;
    const chat = CHATS.find(c => c.id === CURRENT_ID);
    if (chat && chat.messages) {
      chat.messages = chat.messages.slice(0, index);
      await _saveChatsToDB();
      const allMsgs = chatContainerEl.querySelectorAll('.msg');
      allMsgs.forEach(el => { if (parseInt(el.dataset.index) >= index) el.remove(); });
      streamAI();
    }
  }

  async function handleSendOrStop() {
    if (isGenerating) {
      if (abortController) abortController.abort();
      return;
    }
    const text = promptEl.value.trim();
    if (!text && selectedFiles.length === 0) return;
    promptEl.value = "";
    promptEl.style.height = "auto";
    welcomeEl.style.display = "none";
    chatViewEl.style.display = "block";
    userScrolledUp = false;
    const isNewChat = !CURRENT_ID;

    if (!CURRENT_ID) {
      CURRENT_ID = Date.now().toString();
      CHATS.unshift({ id: CURRENT_ID, title: "New Chat", messages: [], needsTitle: true, firstUserMessage: text || "Image upload" });
      renderSidebar();
    }

    const chat = CHATS.find(c => c.id === CURRENT_ID);
    const userMsg = { role: "user", content: text };
    if (selectedFilePreviews.length > 0) {
      userMsg.images = [...selectedFilePreviews];
      selectedFiles = [];
      selectedFilePreviews = [];
      attachmentPreviewEl.innerHTML = '';
      fileInputEl.value = '';
    }
    if (chat) {
      if (!chat.messages) chat.messages = [];
      chat.messages.push(userMsg);
      renderMsg("user", text, chat.messages.length - 1, true, userMsg.images);
      streamAI(isNewChat);
    }
  }

  function _createImageContent(base64) {
    if (base64.startsWith("data:")) return { type: "image_url", image_url: { url: base64 } };
    return null;
  }

  async function streamAI(isNewChat = false) {
    isGenerating = true;
    sendBtn.classList.add("active");
    iconSend.style.display = "none";
    iconStop.style.display = "block";

    const chat = CHATS.find(c => c.id === CURRENT_ID);
    if (!chat) return;
    const msgIndex = chat.messages.length;
    const msgDiv = renderMsg("assistant", "", msgIndex, false, null, true);
    const bodyDiv = msgDiv.querySelector(".md-body");
    currentStreamText = "";
    lastRenderedText = "";
    currentStreamElement = bodyDiv;

    startRenderLoop();
    abortController = new AbortController();

    try {
      const apiMessages = chat.messages.map(msg => {
        if (msg.images && msg.images.length > 0) {
          const content = [{ type: "text", text: msg.content || "What is in these images?" }];
          msg.images.forEach(img => {
            const imgContent = _createImageContent(img);
            if (imgContent) content.push(imgContent);
          });
          return { role: msg.role, content: content };
        }
        return { role: msg.role, content: msg.content };
      });

      const modelPrompt = MODEL_CONFIG[currentModel]?.prompt || "You are a helpful assistant.";
      const systemMessage = modelPrompt;

      const response = await fetch(`${API_BASE}/v1/chat/completions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + PK },
        body: JSON.stringify({
          model: currentModel,
          messages: [{ role: "system", content: systemMessage }, ...apiMessages],
          stream: true,
          seed: Math.floor(1e6 * Math.random())
        }),
        signal: abortController.signal
      });

      if (response.status === 402) { _showQuotaToast(); throw new Error("Quota Exceeded"); }
      if (!response.ok) throw new Error("HTTP error " + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.trim().startsWith("data: ")) continue;
          const jsonStr = line.trim().slice(6);
          if ("[DONE]" === jsonStr) break;
          try {
            const data = JSON.parse(jsonStr);
            const content = data.choices?.[0]?.delta?.content;
            if (content) { currentStreamText += content; }
          } catch (e) {}
        }
      }
      chat.messages.push({ role: "assistant", content: currentStreamText });
      await _saveChatsToDB();
      updateBalance();
      if (isNewChat && chat.firstUserMessage) _generateChatTitle(CURRENT_ID, chat.firstUserMessage, currentStreamText);

    } catch (err) {
      stopRenderLoop();
      if (err.name === "AbortError") {
        if (currentStreamText.length > 0) {
          chat.messages.push({ role: "assistant", content: currentStreamText + " [Stopped]" });
          await _saveChatsToDB();
        }
      } else bodyDiv.innerHTML = '<span style="color:#ef4444">Error: ' + err.message + '</span>';
    } finally {
      msgDiv.remove();
      if (currentStreamText.length > 0) {
        renderMsg("assistant", currentStreamText, msgIndex, true, null, true);
      }
      abortController = null;
      isGenerating = false;
      sendBtn.classList.remove("active");
      iconSend.style.display = "block";
      iconStop.style.display = "none";
      // Removed scrollToBottom(true) to prevent jumping after user scrolled up
    }
  }

  function startRenderLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    renderPending = true;

    function loop() {
      if (!renderPending) return;

      if (currentStreamText !== lastRenderedText) {
        const html = parseMarkdown(currentStreamText);
        const changedNodes = diffAndPatch(currentStreamElement, html);

        if (changedNodes.length > 0 && window.MathJax) {
          MathJax.typesetPromise(changedNodes).catch(e => console.log(e));
        }

        lastRenderedText = currentStreamText;
      }

      if (!userScrolledUp && currentStreamElement) {
        scrollToBottom();
      }
      rafId = requestAnimationFrame(loop);
    }
    loop();
  }

  function stopRenderLoop() {
    renderPending = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function openLightbox(images, index) {
    const modal = $('lightbox-modal');
    const mainImg = $('lightbox-img');
    const thumbsContainer = $('lightbox-thumbs');
    thumbsContainer.innerHTML = '';
    images.forEach((src, i) => {
      const thumb = document.createElement('img');
      thumb.src = src;
      thumb.className = 'lightbox-thumb' + (i === index ? ' active' : '');
      thumb.onclick = () => {
        mainImg.src = src;
        document.querySelectorAll('.lightbox-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      };
      thumbsContainer.appendChild(thumb);
    });
    mainImg.src = images[index];
    modal.classList.add('show');
  }

  function closeLightbox() { $('lightbox-modal').classList.remove('show'); }

  async function handleFiles(files) {
    const newFiles = Array.from(files);
    for (const file of newFiles) {
      if (selectedFiles.length >= 5) break;
      selectedFiles.push(file);
      imageWorker.postMessage(file);
    }
  }

  function updateAttachmentPreview() {
    attachmentPreviewEl.innerHTML = '';
    if (selectedFilePreviews.length > 0) {
      const pill = document.createElement('div');
      pill.className = 'pill-tag';
      pill.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>' + selectedFilePreviews.length + ' Image' + (selectedFilePreviews.length > 1 ? 's' : '') + ' selected' + '<div class="pill-remove" onclick="App.clearFiles(event)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>';
      pill.onclick = (e) => {
        if (e.target.closest('.pill-remove')) return;
        openLightbox(selectedFilePreviews, 0);
      };
      attachmentPreviewEl.appendChild(pill);
    }
  }

  function clearFiles(e) {
    if (e) e.stopPropagation();
    selectedFiles = [];
    selectedFilePreviews = [];
    attachmentPreviewEl.innerHTML = '';
    fileInputEl.value = '';
  }

  const App = {
    init, toggleSidebar, newChat, startSuggestion, handleSendOrStop, copyCodeBlock,
    handleFiles, clearFiles, openLightbox, closeLightbox, scrollToBottom, copyText,
    openEditModal, closeEditModal, saveEditModal, toggleInputMenu
  };

  App.init();
</script>
</body>
