<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvica - AI Student Assistant</title>
  <script>
    // Silence AI Client Model Fallbacks & PDF.js / React Router warnings
    const originalLog = console.log;
    console.log = function(...args) {
      if (typeof args[0] === 'string' && args[0].includes('🚀')) return;
      originalLog.apply(console, args);
    };

    const originalWarn = console.warn;
    console.warn = function(...args) {
      if (typeof args[0] === 'string' && (
          args[0].includes('Warning: TT:') || 
          args[0].includes('❌') || 
          args[0].includes('AnimatePresence') ||
          args[0].includes('React Router Future Flag Warning')
      )) return;
      originalWarn.apply(console, args);
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
